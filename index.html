<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>

<body>
    <div class="calculator-container">
        <div class="result">
            <p>0</p>
        </div>
        <div class="buttons">
            <button class="button light-grey">␡</button>
            <button class="button light-grey">AC</button>
            <button class="button light-grey" data-type="operator">%</button>
            <button class="button orange" data-type="operator">/</button>
            <button class="button dark-grey" data-type="number">8</button>
            <button class="button dark-grey" data-type="number">7</button>
            <button class="button dark-grey" data-type="number">9</button>
            <button class="button orange" data-type="operator">X</button>
            <button class="button dark-grey" data-type="number">4</button>
            <button class="button dark-grey" data-type="number">5</button>
            <button class="button dark-grey" data-type="number">6</button>
            <button class="button orange" data-type="operator">-</button>
            <button class="button dark-grey" data-type="number">1</button>
            <button class="button dark-grey" data-type="number">2</button>
            <button class="button dark-grey" data-type="number">3</button>
            <button class="button orange" data-type="operator">+</button>
            <button class="button dark-grey" data-type="operator">+/-</button>
            <button class="button dark-grey" data-type="number">0</button>
            <button class="button dark-grey">,</button>
            <button class="button orange" data-type="operator">=</button>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
