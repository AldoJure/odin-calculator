<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>

<body>
    <div class="calculator-container">
        <div class="result">
            <p>0</p>
        </div>
        <div class="buttons">
            <button class="button light-grey" data-type="operator" value="delete">␡</button>
            <button class="button light-grey" data-type="operator" value="delete-all">AC</button>
            <button class="button light-grey" data-type="operator" value="%">%</button>
            <button class="button orange" data-type="operator" value="/">/</button>
            <button class="button dark-grey" data-type="number" value="7">7</button>
            <button class="button dark-grey" data-type="number" value="8">8</button>
            <button class="button dark-grey" data-type="number" value="9">9</button>
            <button class="button orange" data-type="operator" value="x">X</button>
            <button class="button dark-grey" data-type="number" value="4">4</button>
            <button class="button dark-grey" data-type="number" value="5">5</button>
            <button class="button dark-grey" data-type="number" value="6">6</button>
            <button class="button orange" data-type="operator" value="-">-</button>
            <button class="button dark-grey" data-type="number" value="1">1</button>
            <button class="button dark-grey" data-type="number" value="2">2</button>
            <button class="button dark-grey" data-type="number" value="3">3</button>
            <button class="button orange" data-type="operator" value="+">+</button>
            <button class="button dark-grey" data-type="operator">+/-</button>
            <button class="button dark-grey" data-type="number" value="0">0</button>
            <button class="button dark-grey" data-type="number" value=",">,</button>
            <button class="button orange" data-type="operator" value="=">=</button>
        </div>
    </div>

    <script src="./index.js"></script>
</body>

</html>
