<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculator</title>
</head>

<body>
    <div class="calculator-container">
        <div class="result">

        </div>
        <div class="buttons">
            <button class="button light-grey delete">␡</button>
            <button class="button light-grey restore">AC</button>
            <button class="button light-grey percent">%</button>
            <button class="button orange divide">/</button>
            <button class="button dark-grey 7">7</button>
            <button class="button dark-grey 8">8</button>
            <button class="button dark-grey 9">9</button>
            <button class="button orange multiply">X</button>
            <button class="button dark-grey 4">4</button>
            <button class="button dark-grey 5">5</button>
            <button class="button dark-grey 6">6</button>
            <button class="button orange substract">-</button>
            <button class="button dark-grey 1">1</button>
            <button class="button dark-grey 2">2</button>
            <button class="button dark-grey 3">3</button>
            <button class="button orange add">+</button>
            <button class="button dark-grey add-substract">+/-</button>
            <button class="button dark-grey 0">0</button>
            <button class="button dark-grey comma">,</button>
            <button class="button orange equals">=</button>
        </div>
    </div>
</body>

</html>
